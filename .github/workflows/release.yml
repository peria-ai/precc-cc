name: Release

# Triggered when a version tag is pushed to the private repo.
# Delegates the actual build to the PUBLIC repo's build-release.yml
# workflow, which runs on free CI runners and clones private source
# via PRIVATE_SOURCE_TOKEN.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

env:
  PUBLIC_REPO: peria-ai/precc-cc

jobs:
  trigger-public-build:
    name: Trigger public repo build
    runs-on: ubuntu-22.04
    steps:
      - name: Trigger build-release on public repo
        env:
          PRECC_CC_TOKEN: ${{ secrets.PRECC_CC_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          curl -fsSL \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${PRECC_CC_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${PUBLIC_REPO}/actions/workflows/build-release.yml/dispatches" \
            -d "{\"ref\":\"main\",\"inputs\":{\"release_version\":\"${TAG}\"}}"
          echo "Triggered build-release workflow on ${PUBLIC_REPO} for ${TAG}"
