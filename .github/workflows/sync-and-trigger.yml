name: Sync public repo and trigger CI

# Runs on every push to master.
# 1. Syncs whitelisted files to yijunyu/precc-cc (public)
# 2. Triggers the build-and-release workflow on the public repo via workflow_dispatch
#
# The build itself runs on the PUBLIC repo's free CI runners.
# The public workflow clones private source via PRIVATE_SOURCE_TOKEN.

on:
  push:
    branches:
      - master

permissions:
  contents: read

env:
  PUBLIC_REPO: yijunyu/precc-cc

jobs:
  sync-and-trigger:
    name: Sync public repo + trigger CI
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout private repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from Cargo.toml
        id: version
        run: |
          VERSION=$(grep '^version = ' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Detected version: v${VERSION}"

      - name: Sync files to public repo
        env:
          PRECC_CC_TOKEN: ${{ secrets.PRECC_CC_TOKEN }}
        run: |
          git config --global user.email "ci@precc"
          git config --global user.name  "PRECC CI"

          # Clone public repo
          git clone "https://x-access-token:${PRECC_CC_TOKEN}@github.com/${PUBLIC_REPO}.git" ../precc-cc

          # Copy whitelisted files (mirrors deploy.toml mappings)
          cp README.demo.md                                           ../precc-cc/README.md
          cp LICENSE-MIT                                              ../precc-cc/LICENSE-MIT
          mkdir -p ../precc-cc/scripts
          cp scripts/install.sh                                       ../precc-cc/scripts/install.sh
          cp scripts/install.ps1                                      ../precc-cc/scripts/install.ps1
          cp .claude-plugin/marketplace.json                          ../precc-cc/.claude-plugin/marketplace.json
          mkdir -p ../precc-cc/.claude-plugin/plugins/precc/commands
          cp .claude-plugin/plugins/precc/plugin.json                 ../precc-cc/.claude-plugin/plugins/precc/plugin.json
          cp .claude-plugin/plugins/precc/commands/init.md            ../precc-cc/.claude-plugin/plugins/precc/commands/init.md
          cp .claude-plugin/plugins/precc/commands/ingest.md          ../precc-cc/.claude-plugin/plugins/precc/commands/ingest.md
          cp .claude-plugin/plugins/precc/commands/skills.md          ../precc-cc/.claude-plugin/plugins/precc/commands/skills.md
          cp .claude-plugin/plugins/precc/commands/report.md          ../precc-cc/.claude-plugin/plugins/precc/commands/report.md
          cp .claude-plugin/plugins/precc/commands/savings.md         ../precc-cc/.claude-plugin/plugins/precc/commands/savings.md
          cp .claude-plugin/plugins/precc/commands/search.md          ../precc-cc/.claude-plugin/plugins/precc/commands/search.md 2>/dev/null || true
          cp .claude-plugin/plugins/precc/commands/compress.md        ../precc-cc/.claude-plugin/plugins/precc/commands/compress.md 2>/dev/null || true

          # Sync workflow files to public repo (enables CI on free runners)
          mkdir -p ../precc-cc/.github/workflows
          cp .github/workflows/build-release.yml                      ../precc-cc/.github/workflows/build-release.yml
          cp .github/workflows/clawhub-publish.yml                    ../precc-cc/.github/workflows/clawhub-publish.yml

          # Sync skill definitions
          mkdir -p ../precc-cc/skills/precc
          cp skills/precc/SKILL.md                                    ../precc-cc/skills/precc/SKILL.md 2>/dev/null || true

          # Commit and push
          cd ../precc-cc
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to sync."
          else
            PRIV_SHA=$(cd - && git rev-parse --short HEAD)
            git commit -m "sync from precc_cc_priv@${PRIV_SHA}"
            git push origin main
          fi

      - name: Trigger build-and-release on public repo
        env:
          PRECC_CC_TOKEN: ${{ secrets.PRECC_CC_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          curl -fsSL \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${PRECC_CC_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${PUBLIC_REPO}/actions/workflows/build-release.yml/dispatches" \
            -d "{\"ref\":\"main\",\"inputs\":{\"release_version\":\"${TAG}\"}}"
          echo "Triggered build-release workflow on ${PUBLIC_REPO} for ${TAG}"
