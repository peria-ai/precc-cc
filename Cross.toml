# Cross.toml — configuration for `cross` (Linux cross-compilation)
# https://github.com/cross-rs/cross

[build]
# Pre-build hook to install OpenSSL dev headers inside the cross container.
# SQLCipher's bundled amalgamation requires libssl headers at compile time.
pre-build = [
    "apt-get update -qq",
    "apt-get install -y --no-install-recommends libssl-dev pkg-config",
]

[target.aarch64-unknown-linux-gnu]
# Use the default cross image; pre-build above installs the aarch64 openssl.
image = "ghcr.io/cross-rs/aarch64-unknown-linux-gnu:main"
